##### ─── CORE ─────────────────────────────────────────────
# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Vi mode
set -g status-keys vi
set -g mode-keys vi

# True color
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

# Clipboard
set -g set-clipboard on

# Faster UI
set -g escape-time 0
set -g status-interval 5

##### ─── COLOR PALETTE ────────────────────────────────────

# Backgrounds
set -g @bg "#212121"
set -g @bg2 "#333333"
set -g @bg3 "#454545"
set -g @bg4 "#565656"

# Foregrounds
set -g @fg "#F7EDED"
set -g @fg2 "#E3DADA"
set -g @fg3 "#CFC7C7"
set -g @fg4 "#BCB4B4"

# Accents
set -g @keyword "#EC5F99"
set -g @builtin "#E5BCD4"
set -g @const "#FF7800"
set -g @comment "#8C6F84"
set -g @func "#FF0065"
set -g @str "#DEDDDA"
set -g @type "#EE2A7B"
set -g @var "#FCDA04"
set -g @warn "#FF0000"
set -g @warn2 "#FF8800"


##### ─── PANES ────────────────────────────────────────────

# Pane borders
set -g pane-border-style fg=#454545
set -g pane-active-border-style fg=#EC5F99

# Active pane highlight
set -g window-style bg=#212121
set -g window-active-style bg=#333333


##### ─── STATUS BAR ───────────────────────────────────────

set -g status on
set -g status-style fg=#CFC7C7,bg=#212121

# LEFT
set -g status-left-length 100
set -g status-left "\
#[fg=#212121,bg=#FCDA04,bold] #S \
#[fg=#FCDA04,bg=#333333] \
#[fg=#F7EDED,bg=#333333] #I:#W \
#[fg=#333333,bg=#212121] \
"

# RIGHT
set -g status-right-length 150
set -g status-right "\
#[fg=#333333,bg=#212121]\
#[fg=#F7EDED,bg=#333333] %R \
#[fg=#565656,bg=#333333]\
#[fg=#F7EDED,bg=#565656] %d %b \
#[fg=#333333,bg=#565656]\
#[fg=#FCDA04,bg=#333333] #U@#H \
"


##### ─── WINDOW TABS ──────────────────────────────────────

# Inactive
set -g window-status-format "\
#[fg=#8C6F84,bg=#212121] #I \
#[fg=#CFC7C7,bg=#212121]#W \
"

# Active
set -g window-status-current-format "\
#[fg=#212121,bg=#EC5F99,bold] #I \
#[fg=#212121,bg=#EC5F99,bold]#W \
"

# Styles
set -g window-status-style fg=#CFC7C7,bg=#212121
set -g window-status-current-style fg=#212121,bg=#EC5F99,bold

set -g window-status-bell-style fg=#FF0000,bold
set -g window-status-activity-style fg=#FF8800


##### ─── MESSAGES / MODES ─────────────────────────────────

set -g message-style fg=#212121,bg=#FCDA04,bold
set -g message-command-style fg=#FCDA04,bg=#212121,bold
set -g mode-style fg=#212121,bg=#FCDA04,bold


##### ─── SPLIT KEYBINDINGS (_ / |) ────────────────────────

# Horizontal split (_)
bind _ split-window -v -c "#{pane_current_path}"

# Vertical split (|)
bind | split-window -h -c "#{pane_current_path}"

# Easier navigation (vim style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R


##### ─── QUALITY OF LIFE ──────────────────────────────────

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# Mouse toggle
bind m set -g mouse \; display-message "Mouse: #{?mouse,on,off}"

# Start window index at 1
set -g base-index 1
setw -g pane-base-index 1

# Automatically rename windows
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"

# Allow easier pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

